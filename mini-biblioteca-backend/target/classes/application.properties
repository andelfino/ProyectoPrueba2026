# Servidor
server.port=8080

# PostgreSQL (ajustá usuario, contraseña y nombre de base en tu máquina)
spring.datasource.url=jdbc:postgresql://localhost:5433/minibiblioteca
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Nombre de la aplicación (opcional)
spring.application.name=mini-biblioteca-backend
