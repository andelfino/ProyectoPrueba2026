services:
  postgres:
    image: postgres:16-alpine
    container_name: minibiblioteca-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minibiblioteca
    volumes:
      - minibiblioteca_pgdata:/var/lib/postgresql/data

volumes:
  minibiblioteca_pgdata:
